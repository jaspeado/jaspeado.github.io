<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor 3D - Ucrania</title>
    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="loading">⏳ Cargando CesiumJS...</div>
    <div id="info">🌍 Visor 3D - Ucrania</div>
    <div id="cesiumContainer"></div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Widgets/widgets.css" 
          rel="stylesheet">

    <script>
        // --- CONFIGURACIÓN ---
        // Token restringido a https://jaspeado.github.io/
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzMzVhMzc5NS02YmNjLTQwMTUtYjIyMC03YWQ5ZDJjYWY4M2QiLCJpZCI6NDUwMjY4LCJzdWIiOiJqYXZpZ2VvIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6IlZpc29yIEdpdEh1YiBQYWdlcyIsImlhdCI6MTc4Mjc0NTQwMH0.NzbI9bglV_dWgoFQLat_euWpVpJhRkOE8NQwcAaEek8';  // ← REEMPLAZA ESTO
        
        const GEOJSON_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';
        
        // --- CREAR VISOR (SIN TERRENO AÚN) ---
        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayerPicker: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            timeline: false,
            animation: false,
        });
        
        // --- ✅ TERRENO 3D CORRECTO (Cesium 1.128) ---
        // Usamos CesiumTerrainProvider con la URL de Cesium World Terrain
        const terrainProvider = new Cesium.CesiumTerrainProvider({
            url: 'https://assets.cesium.com/1/'
        });
        viewer.terrainProvider = terrainProvider;
        
        // --- IMAGEN DE SATÉLITE ---
        viewer.imageryLayers.addImageryProvider(
            new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            })
        );
        
        // --- CARGAR DATOS DE INCENDIOS ---
        fetch(GEOJSON_URL)
            .then(response => response.json())
            .then(data => {
                const features = data.features;
                console.log('📊 Cargando ' + features.length + ' puntos...');
                
                // Filtrar: FRP > 10 MW
                const filtered = features.filter(f => {
                    const props = f.properties;
                    const frp = props.frp || 0;
                    return frp > 10;
                });
                
                // Limitar a 500 puntos
                const limited = filtered.slice(0, 500);
                console.log('✅ Mostrando ' + limited.length + ' puntos');
                
                // Crear entidades en Cesium
                limited.forEach(f => {
                    const coords = f.geometry.coordinates;
                    const props = f.properties;
                    const size = Math.max(5, Math.min(20, props.frp / 10));
                    
                    viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1], 0),
                        point: {
                            pixelSize: size,
                            color: Cesium.Color.RED,
                            outlineColor: Cesium.Color.YELLOW,
                            outlineWidth: 2,
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        properties: {
                            frp: props.frp,
                            date: props.acq_date
                        }
                    });
                });
                
                // Ocultar loading
                document.getElementById('loading').style.display = 'none';
                
                // Actualizar info
                document.getElementById('info').textContent = 
                    '🌍 Visor 3D | ' + limited.length + ' incendios | FRP > 10 MW';
                
                // Volar a Ucrania
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 500000),
                    duration: 2
                });
            })
            .catch(error => {
                console.error('❌ Error cargando datos:', error);
                document.getElementById('loading').textContent = '❌ Error cargando datos';
            });
        
        // --- CLIC PARA INFORMACIÓN ---
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(e) {
            const picked = viewer.scene.pick(e.position);
            if (picked && picked.id && picked.id.properties) {
                const p = picked.id.properties;
                alert('🔥 FRP: ' + p.frp.getValue() + ' MW\n📅 Fecha: ' + p.date.getValue());
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    </script>
</body>
</html>
